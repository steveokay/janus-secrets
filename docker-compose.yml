services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: janus
      POSTGRES_PASSWORD: janus-dev
      POSTGRES_DB: janus
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U janus -d janus"]
      interval: 3s
      timeout: 3s
      retries: 20

  janus:
    build: .
    command: server
    environment:
      JANUS_DATABASE_URL: postgres://janus:janus-dev@postgres:5432/janus?sslmode=disable
      JANUS_SEAL_TYPE: shamir
    ports:
      - "127.0.0.1:8210:8200"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/ready"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  pgdata:
