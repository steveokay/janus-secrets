openapi: 3.1.0
info:
  title: Janus API
  version: "0.1.0"
  description: >
    Self-hosted, single-tenant secrets manager. All routes are under /v1.
    Authenticate with a service token (Authorization: Bearer janus_svc_…) or a
    UI session cookie. Secret values are never returned in list/metadata views.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: /
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Service token (janus_svc_… / janus_user_…).
    sessionCookie:
      type: apiKey
      in: cookie
      name: janus_session
  schemas:
    NotificationChannel:
      type: object
      description: >-
        Masked notification channel — never carries the destination URL, HMAC
        key, or SMTP password. Non-secret SMTP fields (host/port/from/to/username/
        tls_mode/insecure_skip_verify) are returned for type=smtp so an edit form
        can prefill; smtp_password is write-only and is never present.
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        type: { type: string, enum: [webhook, slack, smtp] }
        enabled: { type: boolean }
        events:
          type: array
          items: { type: string }
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        smtp_host: { type: string, description: "SMTP server host (type=smtp)." }
        smtp_port: { type: integer, description: "SMTP server port (type=smtp)." }
        smtp_from: { type: string, description: "Envelope/From address (type=smtp)." }
        smtp_to:
          type: array
          items: { type: string }
          description: "Recipient addresses (type=smtp)."
        smtp_username: { type: string, description: "SMTP auth username (type=smtp)." }
        smtp_tls_mode: { type: string, enum: [starttls, implicit, none], description: "TLS mode (type=smtp)." }
        smtp_insecure_skip_verify: { type: boolean, description: "Skip TLS cert verification (type=smtp)." }
    BreakGlassGrant:
      type: object
      description: >-
        A time-boxed emergency role elevation. Value-safe — carries no secret
        material. `reason` is operator-entered justification text.
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        scope_level: { type: string, enum: [instance, project, environment] }
        project_id: { type: string, format: uuid, nullable: true }
        environment_id: { type: string, format: uuid, nullable: true }
        elevated_role: { type: string, enum: [viewer, developer, admin, owner] }
        reason: { type: string }
        activated_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time, nullable: true }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, example: forbidden }
            message: { type: string, example: insufficient permissions }
    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string, example: acme-web }
        name: { type: string, example: Acme Web }
        created_at: { type: string, format: date-time }
        last_activity_at:
          type: string
          format: date-time
          nullable: true
          description: Most recent config-version timestamp across the project's configs; null if none.
    Environment:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        slug: { type: string, example: prod }
        name: { type: string, example: Production }
        created_at: { type: string, format: date-time }
        last_activity_at:
          type: string
          format: date-time
          nullable: true
          description: Most recent config-version timestamp across the environment's configs; null if none.
    Config:
      type: object
      properties:
        id: { type: string, format: uuid }
        environment_id: { type: string, format: uuid }
        name: { type: string, example: prod }
        inherits_from: { type: [string, "null"], format: uuid }
        created_at: { type: string, format: date-time }
        promoted_from_env: { type: string, nullable: true }
        promoted_from_version: { type: integer, nullable: true }
    PromotionRequest:
      type: object
      description: >
        An approval-gated promotion request. Value-free: carries key NAMES and
        actions only, never secret values. `diff` is present only on GET of a
        still-pending request whose target config already exists.
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        source_config_id: { type: string, format: uuid }
        source_version: { type: integer }
        target_env_id: { type: string, format: uuid }
        target_config_id: { type: string, format: uuid, description: Present when promoting into an existing config. }
        target_name: { type: string }
        create_target: { type: boolean }
        keys:
          type: array
          items: { type: string }
          description: Selected key names (convenience projection of selections).
        selections:
          type: array
          items:
            type: object
            properties:
              key: { type: string }
              action: { type: string, enum: [set, remove] }
        note: { type: string }
        status: { type: string, enum: [pending, applied, rejected, cancelled] }
        requested_by: { type: string, format: uuid }
        decided_by: { type: string, format: uuid, description: Approver/rejecter; absent while pending. }
        applied_target_version: { type: integer, description: Target config version produced on approval; absent unless applied. }
        created_at: { type: string, format: date-time }
        diff:
          type: object
          description: Value-free diff (key names only), present only on GET of a pending request with an existing target.
          properties:
            source_version: { type: integer }
            target_exists: { type: boolean }
            entries:
              type: array
              items:
                type: object
                properties:
                  key: { type: string }
                  status: { type: string, enum: [add, change, remove, same] }
                  locked: { type: boolean }
    TokenMeta:
      type: object
      description: Token metadata. The raw token is returned only once, at mint.
      properties:
        id: { type: string, example: tok_… }
        name: { type: string, example: ci-deploy }
        scope_kind: { type: string, enum: [config, environment] }
        scope_id: { type: string, format: uuid }
        access: { type: string, enum: [read, readwrite] }
        expires_at: { type: [string, "null"], format: date-time }
        last_used_at:
          type: [string, "null"]
          format: date-time
          description: >-
            Most recent successful authentication with this token, updated
            best-effort and throttled (never rewritten within 60s). Null/absent
            when the token has never authenticated a request. Value-free.
        ip_allowlist:
          type: array
          items: { type: string }
          description: >-
            Optional list of CIDRs (IPv4 or IPv6). When non-empty, a request
            authenticated with this token whose client IP is outside every
            listed CIDR is rejected (403). Empty/absent means any IP.
            Value-free.
          example: ["10.0.0.0/8", "2001:db8::/32"]
    VersionResponse:
      type: object
      description: Reference to a newly created config version (value-free).
      properties:
        version: { type: integer }
        id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
    Reads24h:
      type: object
      description: Names + counts only; never secret values.
      properties:
        reads_24h: { type: integer }
        top_configs:
          type: array
          items:
            type: object
            properties:
              config_id: { type: string }
              config_name: { type: string }
              project_name: { type: string }
              reads: { type: integer }
        top_tokens:
          type: array
          items:
            type: object
            properties:
              token_id: { type: string }
              token_name: { type: string }
              reads: { type: integer }
    TransitKeyMeta:
      type: object
      description: Non-secret transit key metadata; never key material.
      properties:
        name: { type: string }
        type: { type: string, enum: [aes256-gcm, ed25519] }
        latest_version: { type: integer }
        min_decryption_version: { type: integer }
        deletion_allowed: { type: boolean }
        versions:
          type: array
          items:
            type: object
            properties:
              version: { type: integer }
              created_at: { type: string, format: date-time }
    RotationPolicy:
      type: object
      description: Masked projection; never secrets/DSN/keys/value.
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        config_id: { type: string, format: uuid }
        secret_key: { type: string }
        type: { type: string, enum: [postgres, webhook] }
        interval_seconds: { type: integer }
        status: { type: string, enum: [active, paused, failed] }
        failure_count: { type: integer }
        last_error: { type: string, nullable: true }
        next_rotation_at: { type: string, format: date-time }
        last_rotated_at: { type: string, format: date-time, nullable: true }
        last_config_version: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
    RunRecord:
      type: object
      description: One scheduled-run history entry (rotation or sync).
      properties:
        id: { type: integer }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time }
        status: { type: string, enum: [success, failure] }
        error: { type: string, nullable: true }
        config_version: { type: integer, nullable: true }
        keys_count: { type: integer, description: Sync runs only. }
        attempt_num: { type: integer }
    SyncTarget:
      type: object
      description: Masked projection; never creds/fingerprint.
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        config_id: { type: string, format: uuid }
        provider: { type: string, enum: [github, k8s, gitlab, aws_ssm, cloudflare, aws_secrets, vercel, netlify] }
        prune: { type: boolean }
        interval_seconds: { type: integer }
        addr:
          type: object
          properties:
            owner: { type: string }
            repo: { type: string }
            environment: { type: string }
            namespace: { type: string }
            secret_name: { type: string }
            gitlab_url: { type: string }
            project: { type: string }
            environment_scope: { type: string }
            region: { type: string }
            path_prefix: { type: string }
            account_id: { type: string }
            script_name: { type: string }
            vercel_project: { type: string }
            vercel_team_id: { type: string }
            vercel_targets: { type: array, items: { type: string } }
            netlify_account_id: { type: string }
            netlify_site_id: { type: string }
        status: { type: string, enum: [active, paused, failed] }
        failure_count: { type: integer }
        last_error: { type: string, nullable: true }
        next_sync_at: { type: string, format: date-time }
        last_synced_at: { type: string, format: date-time, nullable: true }
        managed_keys:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
    DynamicRole:
      type: object
      description: Dynamic Postgres role definition (never admin_dsn/statements' embedded secrets in list/get views beyond what the creator configured).
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        config_id: { type: string, format: uuid }
        name: { type: string }
        default_ttl_seconds: { type: integer }
        max_ttl_seconds: { type: integer }
        created_at: { type: string, format: date-time }
    DynamicLease:
      type: object
      description: Lease metadata; the one-time password is only ever returned by the issue-creds endpoint.
      properties:
        id: { type: string, format: uuid }
        role_id: { type: string, format: uuid }
        status: { type: string, enum: [active, expired, revoked] }
        db_username: { type: string }
        expires_at: { type: string, format: date-time }
        max_expires_at: { type: string, format: date-time }
        renewed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    OIDCProviderView:
      type: object
      description: OIDC human-login provider config; carries only a secret_set flag, never the client secret.
      properties:
        name: { type: string }
        issuer: { type: string }
        client_id: { type: string }
        secret_set: { type: boolean }
        scopes:
          type: array
          items: { type: string }
        redirect_url: { type: string }
        enabled: { type: boolean }
    FederationConfigView:
      type: object
      properties:
        issuer: { type: string }
        audience: { type: string }
        enabled: { type: boolean }
    FederationBinding:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        match_claims:
          type: object
          additionalProperties: { type: string }
        scope_kind: { type: string, enum: [config, environment] }
        scope_id: { type: string, format: uuid }
        access: { type: string, enum: [read, readwrite] }
        ttl_seconds: { type: integer }
        enabled: { type: boolean }
    AuditEvent:
      type: object
      description: Value-free by construction; audit never records secret values.
      properties:
        seq: { type: integer }
        occurred_at: { type: string, format: date-time }
        actor_kind: { type: string, enum: [user, service_token, anonymous, system] }
        actor_id: { type: string, nullable: true }
        actor_name: { type: string }
        action: { type: string }
        resource: { type: string }
        detail: { type: string, nullable: true }
        result: { type: string, enum: [success, denied, error] }
        result_code: { type: string, nullable: true }
        ip: { type: string }
        prev_hash: { type: string }
        hash: { type: string }
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1 }
      description: Opt-in cursor pagination page size. Omit for the full list.
    Cursor:
      name: cursor
      in: query
      required: false
      schema: { type: string }
  responses:
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but not authorized.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
security:
  - bearerAuth: []
  - sessionCookie: []
tags:
  - { name: projects }
  - { name: environments }
  - { name: configs }
  - { name: secrets }
  - { name: tokens }
  - { name: auth }
  - { name: audit }
  - { name: transit }
  - { name: rotation }
  - { name: sync }
  - { name: dynamic }
  - { name: sys }
  - { name: trash }
  - { name: search }
  - { name: promote }
  - { name: pipeline }
  - { name: kek }
  - { name: members }
  - { name: metrics }
paths:
  # ---------------------------------------------------------------------
  # projects
  # ---------------------------------------------------------------------
  /v1/projects:
    get:
      tags: [projects]
      summary: List projects
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        "200":
          description: Projects (metadata only).
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items: { $ref: '#/components/schemas/Project' }
                  next_cursor: { type: [string, "null"] }
        "401": { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug: { type: string, example: acme-web }
                name: { type: string, example: Acme Web }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
        "400": { description: Validation error. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/projects/{pid}:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [projects]
      summary: Get a project
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [projects]
      summary: Rename a project (name only; slug is immutable)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        "200":
          description: Renamed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [projects]
      summary: Soft-delete (or, with ?destroy=true, hard-destroy) a project
      parameters:
        - name: destroy
          in: query
          required: false
          schema: { type: boolean, default: false }
          description: When true, permanently destroys instead of soft-deleting.
      responses:
        "204": { description: Deleted. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/projects/{pid}/restore:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [projects, trash]
      summary: Restore a soft-deleted project
      responses:
        "200":
          description: Restored.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/projects/{pid}/members:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [members]
      summary: List project members
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        "200":
          description: Project role bindings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id: { type: string }
                        role: { type: string, enum: [viewer, developer, admin, owner] }
                  next_cursor: { type: [string, "null"] }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/projects/{pid}/members/{uid}:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: uid, in: path, required: true, schema: { type: string, format: uuid } }
    put:
      tags: [members]
      summary: Grant or update a project member's role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [viewer, developer, admin, owner] }
      responses:
        "204": { description: Granted. }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [members]
      summary: Revoke a project member's role binding
      responses:
        "204": { description: Revoked. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/projects/{pid}/pipeline:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [pipeline]
      summary: Get the project's promotion pipeline (ordered environment ids)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  environment_ids:
                    type: array
                    items: { type: string, format: uuid }
        "403": { $ref: '#/components/responses/Forbidden' }
    put:
      tags: [pipeline]
      summary: Set the project's promotion pipeline order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                environment_ids:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  environment_ids:
                    type: array
                    items: { type: string, format: uuid }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/projects/{pid}/kek:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [kek]
      summary: Get project KEK status (owner-only, value-free)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  current_version: { type: integer }
                  pending:
                    type: array
                    items:
                      type: object
                      properties:
                        version: { type: integer }
                        dek_count: { type: integer }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/projects/{pid}/kek/rotate:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [kek]
      summary: Rotate the project KEK to a fresh version (owner-only)
      responses:
        "200":
          description: Rotated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  kek_version: { type: integer }
        "403": { $ref: '#/components/responses/Forbidden' }
        "503": { description: Server is sealed. }
  /v1/projects/{pid}/kek/rewrap:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [kek]
      summary: Re-wrap DEKs still under a superseded KEK version (owner-only, value-free sweep)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  rewrapped: { type: integer }
                  retired_versions:
                    type: array
                    items: { type: integer }
                  remaining: { type: integer }
        "403": { $ref: '#/components/responses/Forbidden' }
        "503": { description: Server is sealed. }
  /v1/projects/{pid}/metrics/reads-24h:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [metrics]
      summary: Per-project secret-read counts over the last 24h
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reads24h' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/promote/preview:
    get:
      tags: [promote]
      summary: Preview a promotion diff between a source and target config (or target env for create-mode)
      description: >
        Reveals the source (and, for an existing target, the target) secret
        values so the caller can review before applying. Audited as a
        secret.reveal event.
      parameters:
        - { name: from, in: query, required: true, schema: { type: string, format: uuid }, description: Source config id. }
        - { name: to, in: query, required: false, schema: { type: string, format: uuid }, description: Existing target config id. }
        - { name: to_env, in: query, required: false, schema: { type: string, format: uuid }, description: Target environment id (create-mode; mutually exclusive with `to`). }
      responses:
        "200":
          description: Diff (value-bearing; see description).
          content:
            application/json:
              schema:
                type: object
                properties:
                  source_version: { type: integer }
                  target_exists: { type: boolean }
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string }
                        status: { type: string, enum: [add, change, remove, same] }
                        source_value: { type: string, writeOnly: true, example: "<secret value>" }
                        target_value: { type: string, writeOnly: true, example: "<secret value>" }
                        locked: { type: boolean }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: Not the next allowed pipeline step, or a selected key is locked. }
  /v1/promote:
    post:
      tags: [promote]
      summary: Apply a promotion from a source config to a target config (existing or newly created)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_config]
              properties:
                from_config: { type: string, format: uuid }
                to_config: { type: string, format: uuid, description: Existing target config id. }
                to_env: { type: string, format: uuid, description: Target environment id, required when creating the target. }
                to_name: { type: string, description: Name for a newly created target config. }
                create: { type: boolean }
                source_version: { type: integer }
                selections:
                  type: array
                  items:
                    type: object
                    properties:
                      key: { type: string }
                      action: { type: string, enum: [apply, skip] }
      responses:
        "200":
          description: >
            Applied. Value-free: only the target version and applied/skipped
            key NAMES are returned, never values.
          content:
            application/json:
              schema:
                type: object
                properties:
                  target_version: { type: integer }
                  applied:
                    type: array
                    items: { type: string }
                  skipped:
                    type: array
                    items: { type: string }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: Not the next allowed pipeline step, or a selected key is locked. }

  /v1/promote/requests:
    get:
      tags: [promote]
      summary: List promotion requests (approval workflow)
      description: >
        Value-free. Returns request metadata (key NAMES + status), never secret
        values. Visible items are the caller's own requests plus those they may
        approve (secret:promote on the target env).
      parameters:
        - { name: project, in: query, required: true, schema: { type: string, format: uuid } }
        - { name: status, in: query, required: false, schema: { type: string, enum: [pending, applied, rejected, cancelled] } }
        - { name: mine, in: query, required: false, schema: { type: boolean } }
      responses:
        "200":
          description: Requests (metadata only).
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items: { $ref: '#/components/schemas/PromotionRequest' }
        "400": { description: Missing project. }
        "401": { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [promote]
      summary: File a promotion request (requires promotion:request on the source env)
      description: >
        For users who lack secret:promote on the target env. The request pins the
        source version and records key NAMES + actions only — never values.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_config]
              properties:
                from_config: { type: string, format: uuid }
                to_config: { type: string, format: uuid, description: Existing target config id (target env is derived from it). }
                to_env: { type: string, format: uuid, description: Target env id, required when creating the target. }
                to_name: { type: string }
                create: { type: boolean }
                source_version: { type: integer }
                note: { type: string, description: Justification (non-secret metadata). }
                selections:
                  type: array
                  items:
                    type: object
                    properties:
                      key: { type: string }
                      action: { type: string, enum: [set, remove] }
      responses:
        "201":
          description: Created (pending).
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  status: { type: string, example: pending }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/promote/requests/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [promote]
      summary: Get a promotion request (with a value-free diff)
      responses:
        "200":
          description: >
            Request detail plus a value-free diff (added/changed/removed key
            NAMES only) when the target config already exists.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromotionRequest' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/promote/requests/{id}/approve:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [promote]
      summary: Approve a request and apply the promotion (requires secret:promote on the target; four-eyes)
      description: >
        The approver must differ from the requester. On success the promotion is
        applied immediately. Value-free result (key NAMES only).
      responses:
        "200":
          description: Applied.
          content:
            application/json:
              schema:
                type: object
                properties:
                  target_version: { type: integer }
                  applied: { type: array, items: { type: string } }
                  skipped: { type: array, items: { type: string } }
        "403": { description: Not permitted, or the caller is the requester (four-eyes). }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { description: Request is no longer pending. }
  /v1/promote/requests/{id}/reject:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [promote]
      summary: Reject a promotion request (requires secret:promote on the target; four-eyes)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string }
      responses:
        "200":
          description: Rejected.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: rejected }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { description: Request is no longer pending. }
  /v1/promote/requests/{id}/cancel:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [promote]
      summary: Cancel your own pending promotion request
      responses:
        "200":
          description: Cancelled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: cancelled }
        "403": { description: Only the requester may cancel. }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { description: Request is no longer pending. }

  # ---------------------------------------------------------------------
  # environments
  # ---------------------------------------------------------------------
  /v1/projects/{pid}/environments:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [environments]
      summary: List environments in a project
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  environments:
                    type: array
                    items: { $ref: '#/components/schemas/Environment' }
                  next_cursor: { type: [string, "null"] }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [environments]
      summary: Create an environment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug: { type: string, example: staging }
                name: { type: string, example: Staging }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Environment' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/projects/{pid}/environments/{eid}:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: eid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [environments]
      summary: Get an environment
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Environment' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [environments]
      summary: Rename an environment (name only; slug is immutable)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        "200":
          description: Renamed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Environment' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [environments]
      summary: Soft-delete (or, with ?destroy=true, hard-destroy) an environment
      parameters:
        - name: destroy
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        "204": { description: Deleted. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/projects/{pid}/environments/{eid}/restore:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: eid, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [environments, trash]
      summary: Restore a soft-deleted environment
      responses:
        "200":
          description: Restored.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Environment' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/projects/{pid}/environments/{eid}/clone:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: eid, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [environments]
      summary: Clone an environment (deep-copy config tree + each config's latest secrets)
      description: >
        Creates a new environment in the same project and deep-copies the source
        environment's config tree, remapping inheritance, and re-encrypts each
        config's own latest secrets under the new config's key. Admin+. The
        env.clone audit event is value-free (source/new env ids only).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug: { type: string, example: staging }
                name: { type: string, example: Staging }
      responses:
        "201":
          description: Cloned. Returns the new environment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Environment' }
        "400": { description: Validation error (slug is required). }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { description: An environment with that slug already exists. }
  /v1/projects/{pid}/environments/{eid}/members:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: eid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [members]
      summary: List environment members
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        "200":
          description: Environment role bindings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id: { type: string }
                        role: { type: string, enum: [viewer, developer, admin, owner] }
                  next_cursor: { type: [string, "null"] }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/projects/{pid}/environments/{eid}/members/{uid}:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: eid, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: uid, in: path, required: true, schema: { type: string, format: uuid } }
    put:
      tags: [members]
      summary: Grant or update an environment member's role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [viewer, developer, admin, owner] }
      responses:
        "204": { description: Granted. }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [members]
      summary: Revoke an environment member's role binding
      responses:
        "204": { description: Revoked. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/projects/{pid}/environments/{eid}/configs:
    parameters:
      - { name: pid, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: eid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [configs]
      summary: List configs in an environment
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  configs:
                    type: array
                    items: { $ref: '#/components/schemas/Config' }
                  next_cursor: { type: [string, "null"] }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [configs]
      summary: Create a config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: prod }
                inherits_from: { type: [string, "null"], format: uuid }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Config' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }

  # ---------------------------------------------------------------------
  # configs (by cid) + secrets + versions + locked-keys
  # ---------------------------------------------------------------------
  /v1/configs/{cid}:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [configs]
      summary: Get a config
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Config' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [configs]
      summary: Soft-delete (or, with ?destroy=true, hard-destroy) a config
      parameters:
        - name: destroy
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        "204": { description: Deleted. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/configs/{cid}/restore:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [configs, trash]
      summary: Restore a soft-deleted config
      responses:
        "200":
          description: Restored.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Config' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/configs/{cid}/secrets:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [secrets]
      summary: List secrets in a config (masked metadata, or full values with ?reveal=true)
      description: >
        By default returns masked per-key metadata only (no values, not
        audited). With `?reveal=true` resolves and returns every value
        (references resolved; audited as secret.reveal). With
        `?reveal=true&raw=true` returns raw stored values without reference
        resolution (also audited).
      parameters:
        - name: reveal
          in: query
          required: false
          schema: { type: boolean, default: false }
        - name: raw
          in: query
          required: false
          schema: { type: boolean, default: false }
          description: Only applies when reveal=true.
      responses:
        "200":
          description: OK. Masked by default; value-bearing when reveal=true (see description).
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Masked (default).
                    properties:
                      secrets:
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            value_version: { type: integer }
                            created_at: { type: string, format: date-time }
                            origin: { type: string, description: Config id the value is inherited from, or own. }
                            type: { type: string, enum: [string, password, json, ssh_key, certificate, note], description: Display/handling hint; never a storage or crypto concern. }
                            max_age_seconds: { type: integer, format: int64, description: Effective advisory max-age policy for the key (per-key override, else config default). Omitted when no policy applies. Advisory only — never blocks. }
                            stale: { type: boolean, description: Advisory. True when the key's age (now - created_at) exceeds its effective max_age_seconds. Never blocks. }
                            last_read_at: { type: string, format: date-time, nullable: true, description: Advisory. Timestamp of the most recent per-key reveal (secret.reveal audit event); null when never read per-key. Bulk raw reads record an aggregate resource and are not per-key attributable. }
                            unused: { type: boolean, description: Advisory. True when the key has had no per-key reveal within the unused-secret threshold window (JANUS_UNUSED_SECRET_DAYS, default 90 days) — never read, or last read older than the window. Never blocks. }
                            owner: { type: string, description: Advisory per-key annotation — a human-facing owner label. Value-free metadata; omitted when unset. }
                            note: { type: string, description: Advisory per-key annotation — a free-text note ("what is this / who do I ask"). Value-free metadata; omitted when unset. }
                  - type: object
                    description: Revealed (reveal=true).
                    properties:
                      version: { type: integer }
                      secrets:
                        type: object
                        additionalProperties:
                          type: string
                          writeOnly: true
                          example: "<secret value>"
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      tags: [secrets]
      summary: Batch-write secrets (create a new config version)
      description: Applies one or more key changes atomically as a single new config version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [changes]
              properties:
                message: { type: string, example: "rotate DB creds" }
                changes:
                  type: array
                  items:
                    type: object
                    required: [key]
                    properties:
                      key: { type: string, example: DATABASE_URL }
                      value: { type: string, writeOnly: true, example: "<secret value>" }
                      delete: { type: boolean, default: false }
                      type: { type: string, enum: [string, password, json, ssh_key, certificate, note], description: "Display/handling hint; empty normalizes to string." }
      responses:
        "200":
          description: New config version created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VersionResponse' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/configs/{cid}/secrets/{key}:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: key, in: path, required: true, schema: { type: string } }
    get:
      tags: [secrets]
      summary: Reveal one secret's value (always audited)
      description: >
        Resolves references by default. `?version={n}` reads a specific
        historical value-version (always raw). `?raw=true` returns the raw
        stored value without reference resolution.
      parameters:
        - name: version
          in: query
          required: false
          schema: { type: integer, minimum: 1 }
          description: A specific value-version for this key.
        - name: raw
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: OK. Value is a placeholder here; real responses carry the actual secret.
          content:
            application/json:
              schema:
                type: object
                properties:
                  key: { type: string }
                  value: { type: string, writeOnly: true, example: "<secret value>" }
                  value_version: { type: integer }
                  type: { type: string, enum: [string, password, json, ssh_key, certificate, note] }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      tags: [secrets]
      summary: Write a single secret key (creates a new config version)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: { type: string, writeOnly: true, example: "<secret value>" }
                type: { type: string, enum: [string, password, json, ssh_key, certificate, note], description: "Display/handling hint; empty normalizes to string." }
      responses:
        "200":
          description: New config version created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VersionResponse' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [secrets]
      summary: Delete a single secret key (creates a new config version)
      responses:
        "200":
          description: New config version created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VersionResponse' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/configs/{cid}/secrets/{key}/history:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: key, in: path, required: true, schema: { type: string } }
    get:
      tags: [secrets]
      summary: List a key's value-version metadata (masked, not audited)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  key: { type: string }
                  history:
                    type: array
                    items:
                      type: object
                      properties:
                        value_version: { type: integer }
                        created_at: { type: string, format: date-time }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/configs/{cid}/read-insights:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [secrets]
      summary: Per-key advisory read insights (last-read + 30-day daily sparkline)
      description: >
        Returns, per secret key, its most recent per-key reveal timestamp and a
        fixed-length daily reveal-count sparkline over the trailing 30-day
        window, derived entirely from audit_events reveal metadata. Value-free:
        counts and timestamps only, never a secret value. Rides the same
        secret:read gate as the masked list and — like the masked list — is NOT
        self-audited (it reads only audit metadata). Only per-key reveals
        (resource configs/{cid}/secrets/{key}) are attributed; server-side bulk
        raw reads (aggregate resource, no trailing key) are not. Keys never
        revealed per-key are absent from "keys" (treat absence as "never read").
        daily[i] is the reveal count for the UTC calendar day (today-(29-i));
        the last element (index 29) is today.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  window_days: { type: integer, description: Fixed sparkline window length in days (30). }
                  keys:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        last_read_at:
                          type: string
                          format: date-time
                          nullable: true
                          description: Most recent per-key reveal (null = never read per-key; spans all history, not just the window).
                        daily:
                          type: array
                          items: { type: integer }
                          description: window_days reveal counts, oldest bucket first; last element is today.
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/configs/{cid}/compare:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [secrets]
      summary: Cross-config value-free key-level diff (no values returned)
      description: >
        Compares this config ({cid}, side A) with another config
        (?against={other_cid}, side B) at the key level and returns ONLY
        booleans — never a secret value. Both configs are resolved to plaintext
        server-side (the same reveal path the promotion preview uses) and
        compared in memory; only the union of key names, presence booleans, the
        differ flag, and per-side origins escape. Requires secret:read on BOTH
        configs (authorized independently, deny by default): a caller who cannot
        read one side gets 403 without learning the other side's keys. Emits one
        value-free config.compare audit event (both config paths). differs is
        true only when a key is present in both configs and the resolved
        plaintext values are unequal.
      parameters:
        - name: against
          in: query
          required: true
          schema: { type: string, format: uuid }
          description: The other config id to compare against (side B). Must differ from {cid}.
      responses:
        "200":
          description: Value-free key-level comparison.
          content:
            application/json:
              schema:
                type: object
                properties:
                  config_a: { type: string, format: uuid, description: This config (side A). }
                  config_b: { type: string, format: uuid, description: The compared config (side B). }
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string }
                        in_a: { type: boolean, description: Key present in config A. }
                        in_b: { type: boolean, description: Key present in config B. }
                        differs: { type: boolean, description: True only when present in both and the resolved values are unequal. Never carries the values themselves. }
                        origin_a: { type: string, description: "Origin of the key on side A: own | inherited | overridden; empty when absent." }
                        origin_b: { type: string, description: "Origin of the key on side B: own | inherited | overridden; empty when absent." }
        "400": { description: "against missing, or equal to {cid} (self-compare)." }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/configs/{cid}/locked-keys:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [promote]
      summary: List keys locked against promotion overwrite on this config
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items: { type: string }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [promote]
      summary: Lock a key against promotion overwrite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key: { type: string }
      responses:
        "200":
          description: Locked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  key: { type: string }
                  locked: { type: boolean }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/configs/{cid}/locked-keys/{key}:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: key, in: path, required: true, schema: { type: string } }
    delete:
      tags: [promote]
      summary: Unlock a key
      responses:
        "200":
          description: Unlocked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  key: { type: string }
                  locked: { type: boolean }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/configs/{cid}/max-age:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [secrets]
      summary: List the config's advisory max-age policies (default under key "")
      description: >
        Advisory expiry policy. The config-level default is returned under the
        empty-string key. Purely advisory — never blocks any operation. Requires
        secret:read. Reads are not audited.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  policies:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string, description: 'secret key, or "" for the config default' }
                        max_age_seconds: { type: integer, format: int64 }
        "403": { $ref: '#/components/responses/Forbidden' }
    put:
      tags: [secrets]
      summary: Set or clear the config DEFAULT advisory max-age
      description: >
        Sets the config-level default max-age (applies to any key without a
        per-key override). Send max_age_seconds null to clear. Requires
        secret:write; emits a value-free audit event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                max_age_seconds:
                  type: integer
                  format: int64
                  nullable: true
                  description: positive seconds to set, or null to clear
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  max_age_seconds: { type: integer, format: int64, nullable: true }
        "400": { description: Validation error (non-positive or malformed). }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/configs/{cid}/secrets/{key}/max-age:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: key, in: path, required: true, schema: { type: string } }
    put:
      tags: [secrets]
      summary: Set or clear a PER-KEY advisory max-age override
      description: >
        Per-key override of the config default advisory max-age. Send
        max_age_seconds null to clear the override (falling back to the config
        default). Requires secret:write; emits a value-free audit event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                max_age_seconds:
                  type: integer
                  format: int64
                  nullable: true
                  description: positive seconds to set, or null to clear
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  key: { type: string }
                  max_age_seconds: { type: integer, format: int64, nullable: true }
        "400": { description: Validation error (non-positive or malformed). }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/configs/{cid}/secrets/{key}/annotation:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: key, in: path, required: true, schema: { type: string } }
    put:
      tags: [secrets]
      summary: Set or clear a key's owner + note annotation
      description: >
        Sets a human-facing owner label and free-text note on a key so "what is
        this and who do I ask" is answerable. Value-free — no secret VALUES are
        read or written. Send an empty/null owner and note to clear the whole
        annotation. Owner and note are trimmed; an empty field is treated as
        unset. Requires secret:write; emits a value-free audit event. The stored
        annotation is surfaced per key in the masked GET
        /v1/configs/{cid}/secrets response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                owner: { type: string, nullable: true, description: owner label (<=256 chars), or null/empty to unset }
                note: { type: string, nullable: true, description: free-text note (<=2048 chars), or null/empty to unset }
      responses:
        "200":
          description: OK. Echoes the normalized stored annotation (both null when cleared).
          content:
            application/json:
              schema:
                type: object
                properties:
                  key: { type: string }
                  owner: { type: string, nullable: true }
                  note: { type: string, nullable: true }
        "400": { description: Validation error (bad key or over-length field). }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/configs/{cid}/versions:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [configs]
      summary: List config versions (metadata only, no values)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      type: object
                      properties:
                        version: { type: integer }
                        message: { type: string }
                        created_by: { type: string }
                        created_at: { type: string, format: date-time }
                        promoted_from_env: { type: string }
                        promoted_from_version: { type: integer }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/configs/{cid}/versions/diff:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [configs]
      summary: Diff two config versions (key-level add/change/remove; values masked)
      parameters:
        - { name: a, in: query, required: true, schema: { type: integer, minimum: 1 } }
        - { name: b, in: query, required: true, schema: { type: integer, minimum: 1 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  a: { type: integer }
                  b: { type: integer }
                  added:
                    type: array
                    items: { type: string }
                  changed:
                    type: array
                    items: { type: string }
                  removed:
                    type: array
                    items: { type: string }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/configs/{cid}/rollback:
    parameters:
      - { name: cid, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [configs]
      summary: Roll back to a prior config version (creates a new version)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_version]
              properties:
                target_version: { type: integer, minimum: 1 }
                message: { type: string }
      responses:
        "200":
          description: New config version created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VersionResponse' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }

  # ---------------------------------------------------------------------
  # trash
  # ---------------------------------------------------------------------
  /v1/trash:
    get:
      tags: [trash]
      summary: List soft-deleted projects/environments/configs restorable by the caller
      description: Value-free; items are shown only if the caller holds the same delete-authorization needed to restore them.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        slug: { type: string }
                        name: { type: string }
                        deleted_at: { type: string, format: date-time }
                  environments:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        slug: { type: string }
                        name: { type: string }
                        project_id: { type: string }
                        project_name: { type: string }
                        deleted_at: { type: string, format: date-time }
                  configs:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        environment_id: { type: string }
                        environment_name: { type: string }
                        project_id: { type: string }
                        project_name: { type: string }
                        deleted_at: { type: string, format: date-time }
        "401": { $ref: '#/components/responses/Unauthorized' }

  # ---------------------------------------------------------------------
  # tokens
  # ---------------------------------------------------------------------
  /v1/tokens:
    get:
      tags: [tokens]
      summary: List service tokens (metadata; visibility-filtered to what the caller can read)
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items: { $ref: '#/components/schemas/TokenMeta' }
                  next_cursor: { type: [string, "null"] }
        "401": { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [tokens]
      summary: Mint a service token
      description: The raw token is returned exactly once, in this response. It cannot be retrieved again — only re-minted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, scope, access]
              properties:
                name: { type: string, example: ci-deploy }
                scope:
                  type: object
                  required: [kind, id]
                  properties:
                    kind: { type: string, enum: [config, environment] }
                    id: { type: string, format: uuid }
                access: { type: string, enum: [read, readwrite] }
                ttl_seconds: { type: integer, nullable: true, minimum: 1 }
                ip_allowlist:
                  type: array
                  items: { type: string }
                  description: >-
                    Optional list of CIDRs (IPv4 or IPv6) validated at the API
                    boundary. When non-empty, requests from a client IP outside
                    every listed CIDR are rejected (403). Value-free.
                  example: ["10.0.0.0/8"]
      responses:
        "200":
          description: Minted. `token` is the raw secret, shown once.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, writeOnly: true, example: "<secret value>", description: Raw token, shown once. }
                  id: { type: string }
                  name: { type: string }
                  scope:
                    type: object
                    properties:
                      kind: { type: string }
                      id: { type: string }
                  access: { type: string }
                  expires_at: { type: [string, "null"], format: date-time }
                  ip_allowlist:
                    type: array
                    items: { type: string }
                    description: Effective (canonicalized) CIDR allowlist, empty = any IP.
        "400": { description: Validation error (includes an invalid CIDR in ip_allowlist). }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/tokens/new-ips:
    get:
      tags: [tokens]
      summary: Count service tokens seen from a new IP recently (value-free aggregate)
      description: >-
        Number of distinct (token, IP) first-sightings within the last 24h.
        Backs the Overview in-tray "token used from a new IP" item. Instance
        token:read. Names/counts only — never a secret or token value.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }
                  window_hours: { type: integer, example: 24 }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/tokens/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    patch:
      tags: [tokens]
      summary: Update a service token's IP allowlist (value-free)
      description: >-
        Replaces the token's CIDR allowlist. An empty array clears it (any IP).
        Omitting ip_allowlist leaves it unchanged. Never touches the token
        value/HMAC.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ip_allowlist:
                  type: array
                  items: { type: string }
                  description: New CIDR allowlist (empty = clear). Validated with net.ParseCIDR.
                  example: ["10.0.0.0/8"]
      responses:
        "204": { description: Updated. }
        "400": { description: Validation error (invalid CIDR in ip_allowlist). }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [tokens]
      summary: Revoke a service token
      responses:
        "204": { description: Revoked. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------
  # users / instance members
  # ---------------------------------------------------------------------
  /v1/users:
    get:
      tags: [members]
      summary: List users (instance-wide, admin-only)
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        email: { type: string }
                        disabled: { type: boolean }
                        locked: { type: boolean, description: "True when the account is currently locked out (progressive backoff)." }
                        locked_until: { type: [string, "null"], format: date-time, description: "Lock expiry; present only when locked." }
                        last_login_at: { type: [string, "null"], format: date-time, description: "Most recent successful login (password or OIDC); null/absent if the user has never logged in. Value-free." }
                        created_at: { type: string, format: date-time }
                  next_cursor: { type: [string, "null"] }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [members]
      summary: Create a user
      description: Returns a one-time generated password; the user should change it after first login.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Created. `password` is a one-time generated credential.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  email: { type: string }
                  password: { type: string, writeOnly: true, example: "<secret value>" }
        "400": { description: Validation error (including duplicate email). }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/users/{id}/disable:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [members]
      summary: Disable a user (cannot disable yourself or the last instance owner)
      responses:
        "204": { description: Disabled. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: Cannot disable yourself or the last instance owner. }
  /v1/users/{id}/unlock:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [members]
      summary: Clear a user's account-lockout state (admin early-unlock; cannot unlock yourself)
      description: >
        Resets the failed-login counter, escalation level, and locked_until so a
        progressively-locked account can log in immediately, without waiting for
        the lock to auto-expire.
      responses:
        "204": { description: Unlocked. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { description: Cannot unlock yourself. }
  /v1/instance/members:
    get:
      tags: [members]
      summary: List instance-scoped role bindings
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id: { type: string }
                        role: { type: string, enum: [viewer, developer, admin, owner] }
                  next_cursor: { type: [string, "null"] }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/instance/members/{uid}:
    parameters:
      - { name: uid, in: path, required: true, schema: { type: string, format: uuid } }
    put:
      tags: [members]
      summary: Grant or update an instance-scoped member role (never-lock-out guarded)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [viewer, developer, admin, owner] }
      responses:
        "204": { description: Granted. }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { description: Would demote the last instance owner. }
    delete:
      tags: [members]
      summary: Revoke an instance-scoped member role (never-lock-out guarded)
      responses:
        "204": { description: Revoked. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { description: Would remove the last instance owner. }

  # ---------------------------------------------------------------------
  # auth
  # ---------------------------------------------------------------------
  /v1/auth/login:
    post:
      tags: [auth]
      summary: Log in with email + password; sets a session cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, writeOnly: true, example: "<secret value>" }
                totp_code: { type: string, writeOnly: true, description: "TOTP or recovery code; required when the user has two-factor enabled." }
      responses:
        "200":
          description: Logged in.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id: { type: string }
                      email: { type: string }
        "400": { description: Validation error. }
        "401": { description: "Invalid credentials, or (code `totp_required`) a second-factor code is needed." }
        "429": { description: "Account temporarily locked (code `account_locked`) after repeated failed logins. Only returned to a caller who supplied the correct password; a `Retry-After` header carries the remaining lock window in seconds. A per-IP rate limit can also produce 429." }
  /v1/auth/logout:
    post:
      tags: [auth]
      summary: Log out and clear the session cookie
      responses:
        "204": { description: Logged out. }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /v1/auth/me:
    get:
      tags: [auth]
      summary: Get the current principal
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  kind: { type: string, enum: [user, service_token] }
                  id: { type: string }
                  name: { type: string }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /v1/auth/password:
    post:
      tags: [auth]
      summary: Change the current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old, new]
              properties:
                old: { type: string, writeOnly: true, example: "<secret value>" }
                new: { type: string, writeOnly: true, example: "<secret value>", minLength: 12 }
      responses:
        "204": { description: Changed. }
        "400": { description: Validation error. }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /v1/auth/sessions:
    get:
      tags: [auth]
      summary: List the current user's active sessions
      description: >-
        Self-service. Returns the calling user's non-expired sessions with
        non-secret client metadata (IP, user-agent) and a flag marking the
        requesting session. No credential material is returned.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        created_at: { type: string, format: date-time }
                        last_seen_at: { type: string, format: date-time }
                        expires_at: { type: string, format: date-time }
                        ip: { type: string }
                        user_agent: { type: string }
                        current: { type: boolean }
        "401": { $ref: '#/components/responses/Unauthorized' }
    delete:
      tags: [auth]
      summary: Revoke all other sessions
      description: Deletes every session of the calling user except the current one.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked: { type: integer }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /v1/auth/sessions/{id}:
    delete:
      tags: [auth]
      summary: Revoke one of the current user's sessions
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Revoked. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { description: No such session owned by the caller. }
  /v1/auth/totp:
    get:
      tags: [auth]
      summary: Two-factor (TOTP) status for the current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled: { type: boolean }
                  recovery_remaining: { type: integer }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /v1/auth/totp/enroll:
    post:
      tags: [auth]
      summary: Begin TOTP enrollment
      description: >-
        Generates a fresh shared secret and returns it once as a base32 string
        and an `otpauth://` provisioning URI. Confirm with a code to activate.
        Fails (409) if TOTP is already enabled.
      responses:
        "200":
          description: OK — secret shown once.
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret: { type: string, writeOnly: true, example: "<base32 secret>" }
                  otpauth_url: { type: string, writeOnly: true }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "409": { description: TOTP already enabled. }
  /v1/auth/totp/confirm:
    post:
      tags: [auth]
      summary: Confirm and activate TOTP
      description: Verifies a code against the pending secret, activates the factor, and returns single-use recovery codes (shown once).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, writeOnly: true }
      responses:
        "200":
          description: Activated — recovery codes shown once.
          content:
            application/json:
              schema:
                type: object
                properties:
                  recovery_codes:
                    type: array
                    items: { type: string, writeOnly: true }
        "400": { description: Missing code. }
        "401": { description: Invalid code. }
        "409": { description: No pending enrollment. }
  /v1/auth/totp/disable:
    post:
      tags: [auth]
      summary: Disable TOTP
      description: Verifies a current TOTP or recovery code, then removes the factor and its recovery codes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, writeOnly: true }
      responses:
        "204": { description: Disabled. }
        "400": { description: Missing code. }
        "401": { description: Invalid code. }
        "409": { description: TOTP not enabled. }
  /v1/auth/totp/recovery-codes:
    post:
      tags: [auth]
      summary: Regenerate recovery codes
      description: Verifies a current second factor and re-issues the recovery-code set (invalidating the old set).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, writeOnly: true }
      responses:
        "200":
          description: New recovery codes shown once.
          content:
            application/json:
              schema:
                type: object
                properties:
                  recovery_codes:
                    type: array
                    items: { type: string, writeOnly: true }
        "401": { description: Invalid code. }
        "409": { description: TOTP not enabled. }
  /v1/auth/oidc/status:
    get:
      tags: [auth]
      summary: Whether OIDC human login is enabled (public, rate-limited)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled: { type: boolean }
                  name: { type: string }
  /v1/auth/oidc/login:
    get:
      tags: [auth]
      summary: Start the OIDC Authorization Code + PKCE login flow (redirects to the IdP)
      responses:
        "302": { description: Redirect to the identity provider. }
        "404": { description: OIDC login is not configured. }
        "503": { description: Server is sealed. }
  /v1/auth/oidc/callback:
    get:
      tags: [auth]
      summary: OIDC login callback (browser-bound via state cookie); redirects to the app on success
      parameters:
        - { name: state, in: query, required: false, schema: { type: string } }
        - { name: code, in: query, required: false, schema: { type: string } }
        - { name: error, in: query, required: false, schema: { type: string } }
      responses:
        "302": { description: Redirect to the app with a session cookie set. }
        "400": { description: Provider error or invalid/missing state binding. }
        "401": { description: Authentication failed. }
  /v1/auth/oidc/federate:
    post:
      tags: [auth]
      summary: Exchange a CI OIDC identity token (e.g. GitHub Actions JWT) for a short-lived scoped service token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string, writeOnly: true, example: "<secret value>", description: CI-issued OIDC identity token (JWT). }
      responses:
        "200":
          description: Federated. `token` is a freshly minted, short-lived service token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, writeOnly: true, example: "<secret value>" }
                  scope:
                    type: object
                    properties:
                      kind: { type: string }
                      id: { type: string }
                      access: { type: string }
                  expires_at: { type: string, format: date-time }
        "401": { description: Federation exchange failed (uniform response for every cause). }

  # ---------------------------------------------------------------------
  # audit
  # ---------------------------------------------------------------------
  /v1/audit/verify:
    get:
      tags: [audit]
      summary: Walk the hash chain and report integrity status + event count
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  count: { type: integer }
                  head_seq: { type: integer }
                  head_hash: { type: string, description: Hex-encoded chain head hash. }
                  broken_at_seq: { type: integer }
                  reason: { type: string }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/audit/events:
    get:
      tags: [audit]
      summary: Paginated, filterable audit event viewer
      parameters:
        - { name: from, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: actor, in: query, required: false, schema: { type: string } }
        - { name: action, in: query, required: false, schema: { type: string } }
        - { name: result, in: query, required: false, schema: { type: string, enum: [success, denied, error] } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
        - { name: cursor, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                  next_cursor: { type: [integer, "null"] }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/audit/export:
    get:
      tags: [audit]
      summary: Stream filtered audit events as JSONL or CSV
      parameters:
        - { name: format, in: query, required: false, schema: { type: string, enum: [jsonl, csv], default: jsonl } }
        - { name: from, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: actor, in: query, required: false, schema: { type: string } }
        - { name: action, in: query, required: false, schema: { type: string } }
        - { name: result, in: query, required: false, schema: { type: string, enum: [success, denied, error] } }
      responses:
        "200":
          description: Streamed file (application/x-ndjson or text/csv).
          content:
            application/x-ndjson:
              schema: { type: string }
            text/csv:
              schema: { type: string }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/audit/histogram:
    get:
      tags: [audit]
      summary: Bucketed success/denied/error event counts over a time range (value-free)
      parameters:
        - { name: from, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: bucket, in: query, required: false, schema: { type: string, enum: [hour, day], default: day } }
        - { name: actor, in: query, required: false, schema: { type: string } }
        - { name: action, in: query, required: false, schema: { type: string } }
        - { name: result, in: query, required: false, schema: { type: string, enum: [success, denied, error] } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  buckets:
                    type: array
                    items:
                      type: object
                      properties:
                        start: { type: string, format: date-time }
                        success: { type: integer }
                        denied: { type: integer }
                        error: { type: integer }
        "400": { description: Validation error (missing from/to, invalid bucket, or range too large for the bucket). }
        "403": { $ref: '#/components/responses/Forbidden' }

  # ---------------------------------------------------------------------
  # metrics
  # ---------------------------------------------------------------------
  /v1/metrics/reads-24h:
    get:
      tags: [metrics]
      summary: Instance-wide secret-read counts over the last 24h
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reads24h' }
        "403": { $ref: '#/components/responses/Forbidden' }

  # ---------------------------------------------------------------------
  # search
  # ---------------------------------------------------------------------
  /v1/search/keys:
    get:
      tags: [search]
      summary: Cross-config search over secret KEY NAMES (metadata; never values)
      description: >
        Substring, case-insensitive search over secret key names across the
        latest live config version of every config. Results are authz-filtered
        per config (deny-by-default): a config the caller cannot read is
        silently dropped, so search never leaks the existence of keys in
        projects the caller cannot see. Never reads, returns, or logs a secret
        value; emits no audit event (metadata list view). Bounded: at most 50
        results are returned and `truncated` indicates more were available.
      parameters:
        - { name: q, in: query, required: true, schema: { type: string, minLength: 2 }, description: Substring to match against key names (min 2 chars). }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 50 }, description: Max results (clamped to 50). }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string }
                        project_id: { type: string, format: uuid }
                        project_name: { type: string }
                        project_slug: { type: string }
                        environment_id: { type: string, format: uuid }
                        environment_slug: { type: string }
                        config_id: { type: string, format: uuid }
                        config_name: { type: string }
                  truncated: { type: boolean }
        "400": { description: Validation error (q shorter than 2 chars, or bad limit). }

  # ---------------------------------------------------------------------
  # transit
  # ---------------------------------------------------------------------
  /v1/transit/keys:
    get:
      tags: [transit]
      summary: List transit keys (metadata only, never key material)
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items: { $ref: '#/components/schemas/TransitKeyMeta' }
                  next_cursor: { type: [string, "null"] }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [transit]
      summary: Create a named transit key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name: { type: string, example: app-signing-key }
                type: { type: string, enum: [aes256-gcm, ed25519], example: aes256-gcm }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransitKeyMeta' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/transit/keys/{name}:
    parameters:
      - { name: name, in: path, required: true, schema: { type: string } }
    get:
      tags: [transit]
      summary: Get a transit key's metadata
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransitKeyMeta' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [transit]
      summary: Delete a transit key (only when deletion_allowed is set)
      responses:
        "204": { description: Deleted. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/transit/keys/{name}/rotate:
    parameters:
      - { name: name, in: path, required: true, schema: { type: string } }
    post:
      tags: [transit]
      summary: Rotate a transit key to a new version
      responses:
        "200":
          description: Rotated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransitKeyMeta' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/transit/keys/{name}/config:
    parameters:
      - { name: name, in: path, required: true, schema: { type: string } }
    post:
      tags: [transit]
      summary: Update a transit key's configuration (min_decryption_version, deletion_allowed)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                min_decryption_version: { type: integer, nullable: true }
                deletion_allowed: { type: boolean, nullable: true }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransitKeyMeta' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/transit/keys/{name}/trim:
    parameters:
      - { name: name, in: path, required: true, schema: { type: string } }
    post:
      tags: [transit]
      summary: Trim old key versions below a minimum available version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                min_available_version: { type: integer }
      responses:
        "200":
          description: Trimmed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransitKeyMeta' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/transit/encrypt/{name}:
    parameters:
      - { name: name, in: path, required: true, schema: { type: string } }
    post:
      tags: [transit]
      summary: Encrypt plaintext under a transit key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Plaintext: { type: string, format: byte, writeOnly: true, example: "<base64 secret value>" }
                AssociatedData: { type: string, format: byte }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ciphertext: { type: string }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/transit/decrypt/{name}:
    parameters:
      - { name: name, in: path, required: true, schema: { type: string } }
    post:
      tags: [transit]
      summary: Decrypt ciphertext previously produced by transit encrypt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Ciphertext]
              properties:
                Ciphertext: { type: string }
                AssociatedData: { type: string, format: byte }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  plaintext: { type: string, format: byte, writeOnly: true, example: "<base64 secret value>" }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/transit/sign/{name}:
    parameters:
      - { name: name, in: path, required: true, schema: { type: string } }
    post:
      tags: [transit]
      summary: Sign input with an Ed25519 transit key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Input: { type: string, format: byte }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  signature: { type: string }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/transit/verify/{name}:
    parameters:
      - { name: name, in: path, required: true, schema: { type: string } }
    post:
      tags: [transit]
      summary: Verify an Ed25519 signature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Input: { type: string, format: byte }
                Signature: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/transit/rewrap/{name}:
    parameters:
      - { name: name, in: path, required: true, schema: { type: string } }
    post:
      tags: [transit]
      summary: Rewrap ciphertext under the key's latest version without exposing plaintext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Ciphertext]
              properties:
                Ciphertext: { type: string }
                AssociatedData: { type: string, format: byte }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ciphertext: { type: string }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/transit/datakey/plaintext/{name}:
    parameters:
      - { name: name, in: path, required: true, schema: { type: string } }
    post:
      tags: [transit]
      summary: Generate a data encryption key, returning both plaintext and wrapped forms
      description: The plaintext DEK is deliberately returned once by this explicit endpoint; use the wrapped-only variant when plaintext exposure is not needed.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ciphertext: { type: string }
                  plaintext: { type: string, format: byte, writeOnly: true, example: "<base64 secret value>" }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/transit/datakey/wrapped/{name}:
    parameters:
      - { name: name, in: path, required: true, schema: { type: string } }
    post:
      tags: [transit]
      summary: Generate a data encryption key, returning only its wrapped form
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ciphertext: { type: string }
        "403": { $ref: '#/components/responses/Forbidden' }

  # ---------------------------------------------------------------------
  # rotation
  # ---------------------------------------------------------------------
  /v1/rotation/policies:
    get:
      tags: [rotation]
      summary: List rotation policies for a project
      parameters:
        - { name: project_id, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  policies:
                    type: array
                    items: { $ref: '#/components/schemas/RotationPolicy' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [rotation]
      summary: Create a rotation policy (Postgres ALTER ROLE or generic webhook)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config_id, secret_key, type]
              properties:
                config_id: { type: string, format: uuid }
                secret_key: { type: string, example: DATABASE_PASSWORD }
                type: { type: string, enum: [postgres, webhook] }
                interval_seconds: { type: integer }
                config:
                  type: object
                  description: Rotator-specific config; credential fields are write-only.
                  properties:
                    admin_dsn: { type: string, writeOnly: true, example: "<secret value>" }
                    role: { type: string }
                    password_len: { type: integer }
                    url: { type: string }
                    hmac_key: { type: string, writeOnly: true, example: "<secret value>" }
                    notify_url: { type: string }
                    notify_hmac_key: { type: string, writeOnly: true, example: "<secret value>" }
      responses:
        "201":
          description: Created (masked; no secrets/DSN/keys in the response).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RotationPolicy' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: A policy already exists for this config and key. }
  /v1/rotation/policies/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [rotation]
      summary: Get a rotation policy
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RotationPolicy' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [rotation]
      summary: Update a rotation policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                interval_seconds: { type: integer, nullable: true }
                status: { type: string, nullable: true, enum: [active, paused, failed] }
                config:
                  type: object
                  nullable: true
                  properties:
                    admin_dsn: { type: string, writeOnly: true, example: "<secret value>" }
                    role: { type: string }
                    password_len: { type: integer }
                    url: { type: string }
                    hmac_key: { type: string, writeOnly: true, example: "<secret value>" }
                    notify_url: { type: string }
                    notify_hmac_key: { type: string, writeOnly: true, example: "<secret value>" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RotationPolicy' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [rotation]
      summary: Delete a rotation policy
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/rotation/policies/{id}/runs:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [rotation]
      summary: List run history for a rotation policy (cursor-paginated)
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - { name: cursor, in: query, required: false, schema: { type: integer, minimum: 0 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items: { $ref: '#/components/schemas/RunRecord' }
                  next_cursor: { type: [integer, "null"] }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/rotation/policies/{id}/rotate:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [rotation]
      summary: Trigger an immediate rotation for this policy
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  rotated: { type: boolean }
                  config_version: { type: integer }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "503": { description: Server is sealed. }

  # ---------------------------------------------------------------------
  # sync
  # ---------------------------------------------------------------------
  /v1/sync/targets:
    get:
      tags: [sync]
      summary: List sync targets for a project
      parameters:
        - { name: project_id, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  targets:
                    type: array
                    items: { $ref: '#/components/schemas/SyncTarget' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [sync]
      summary: Create a sync target (GitHub Actions, Kubernetes Secrets, GitLab CI/CD variables, or AWS SSM Parameter Store)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config_id, provider]
              properties:
                config_id: { type: string, format: uuid }
                provider: { type: string, enum: [github, k8s, gitlab, aws_ssm, cloudflare, aws_secrets, vercel, netlify] }
                prune: { type: boolean, nullable: true, description: "Defaults to true when omitted." }
                interval_seconds: { type: integer }
                addr:
                  type: object
                  properties:
                    owner: { type: string, description: GitHub owner (github provider). }
                    repo: { type: string, description: GitHub repo (github provider). }
                    environment: { type: string, description: GitHub environment name (github provider). }
                    namespace: { type: string, description: Kubernetes namespace (k8s provider). }
                    secret_name: { type: string, description: Kubernetes Secret name (k8s provider). }
                    gitlab_url: { type: string, description: "GitLab base URL (gitlab provider; defaults to https://gitlab.com)." }
                    project: { type: string, description: "GitLab project id or URL-encoded group/proj path (gitlab provider)." }
                    environment_scope: { type: string, description: "GitLab CI/CD variable environment scope (gitlab provider, optional)." }
                    region: { type: string, description: "AWS region (aws_ssm and aws_secrets providers)." }
                    path_prefix: { type: string, description: "SSM parameter path prefix (aws_ssm) or Secrets Manager name prefix (aws_secrets), e.g. /janus/app/prod." }
                    account_id: { type: string, description: Cloudflare account id (cloudflare provider). }
                    script_name: { type: string, description: Cloudflare Worker script name (cloudflare provider). }
                    vercel_project: { type: string, description: "Vercel project id or name (vercel provider)." }
                    vercel_team_id: { type: string, description: "Vercel team id (vercel provider, optional)." }
                    vercel_targets: { type: array, items: { type: string, enum: [production, preview, development] }, description: "Vercel target env(s) (vercel provider, optional; defaults to [production])." }
                    netlify_account_id: { type: string, description: "Netlify account id or slug (netlify provider)." }
                    netlify_site_id: { type: string, description: "Netlify site id (netlify provider, optional; account-level variable when omitted)." }
                creds:
                  type: object
                  description: Provider credentials; all fields write-only.
                  properties:
                    pat: { type: string, writeOnly: true, example: "<secret value>", description: GitHub PAT. }
                    api_url: { type: string, description: Kubernetes API server URL. }
                    ca_cert: { type: string, writeOnly: true, example: "<secret value>", description: Kubernetes cluster CA cert. }
                    token: { type: string, writeOnly: true, example: "<secret value>", description: "Kubernetes bearer token (k8s), or GitLab access token with api scope (gitlab)." }
                    access_key_id: { type: string, writeOnly: true, example: "<secret value>", description: "AWS access key id (aws_ssm and aws_secrets providers)." }
                    secret_access_key: { type: string, writeOnly: true, example: "<secret value>", description: "AWS secret access key (aws_ssm and aws_secrets providers)." }
                    session_token: { type: string, writeOnly: true, example: "<secret value>", description: "AWS session token (aws_ssm and aws_secrets providers, optional)." }
                    api_token: { type: string, writeOnly: true, example: "<secret value>", description: "Bearer API token: Cloudflare (Workers Scripts Edit), Vercel API token, or Netlify personal access token." }
      responses:
        "201":
          description: Created (masked; no creds/fingerprint in the response).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SyncTarget' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: A target already exists for this config, provider, and destination. }
  /v1/sync/targets/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [sync]
      summary: Get a sync target
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SyncTarget' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [sync]
      summary: Update a sync target
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                interval_seconds: { type: integer, nullable: true }
                prune: { type: boolean, nullable: true }
                status: { type: string, nullable: true, enum: [active, paused, failed] }
                addr:
                  type: object
                  nullable: true
                  properties:
                    owner: { type: string }
                    repo: { type: string }
                    environment: { type: string }
                    namespace: { type: string }
                    secret_name: { type: string }
                creds:
                  type: object
                  nullable: true
                  properties:
                    pat: { type: string, writeOnly: true, example: "<secret value>" }
                    api_url: { type: string }
                    ca_cert: { type: string, writeOnly: true, example: "<secret value>" }
                    token: { type: string, writeOnly: true, example: "<secret value>" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SyncTarget' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [sync]
      summary: Delete a sync target
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/sync/targets/{id}/runs:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [sync]
      summary: List run history for a sync target (cursor-paginated)
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
        - { name: cursor, in: query, required: false, schema: { type: integer, minimum: 0 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items: { $ref: '#/components/schemas/RunRecord' }
                  next_cursor: { type: [integer, "null"] }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/sync/targets/{id}/sync:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [sync]
      summary: Trigger an immediate sync for this target
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  synced: { type: boolean }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "503": { description: Server is sealed. }

  # ---------------------------------------------------------------------
  # notifications
  # ---------------------------------------------------------------------
  /v1/notifications/channels:
    post:
      tags: [notifications]
      summary: Create a notification channel
      description: >-
        Requires `notification:manage` (admin/owner). The destination URL, the
        optional webhook HMAC key, and the SMTP password are write-only — never
        returned. Subscribes to one or more event kinds: rotation.failed,
        sync.failed, promotion.pending, access.denied. For `webhook`/`slack`
        provide `url` (+ optional `hmac_key` for webhook); for `smtp` provide the
        `smtp_*` fields instead (`url`/`hmac_key` are ignored/rejected).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, events]
              properties:
                name: { type: string }
                type: { type: string, enum: [webhook, slack, smtp] }
                url: { type: string, writeOnly: true, example: "https://hooks.example.com/..." }
                hmac_key: { type: string, writeOnly: true, example: "<secret value>" }
                events:
                  type: array
                  items: { type: string, enum: [rotation.failed, sync.failed, promotion.pending, access.denied, breakglass.activated] }
                smtp_host: { type: string, description: "SMTP server host (type=smtp)." }
                smtp_port: { type: integer, minimum: 1, maximum: 65535, description: "SMTP server port (type=smtp)." }
                smtp_from: { type: string, description: "Envelope/From address (type=smtp)." }
                smtp_to:
                  type: array
                  items: { type: string }
                  description: "One or more recipient addresses (type=smtp)."
                smtp_username: { type: string, description: "SMTP auth username (type=smtp; optional)." }
                smtp_password: { type: string, writeOnly: true, example: "<secret value>", description: "SMTP auth password (type=smtp; write-only)." }
                smtp_tls_mode: { type: string, enum: [starttls, implicit, none], default: starttls, description: "TLS mode (type=smtp)." }
                smtp_insecure_skip_verify: { type: boolean, default: false, description: "Skip SMTP TLS certificate verification (footgun; self-hosted relays only)." }
      responses:
        "201": { description: Created (masked channel view). }
        "400": { description: Validation error. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: A channel with that name already exists. }
    get:
      tags: [notifications]
      summary: List notification channels (masked)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  channels:
                    type: array
                    items: { $ref: '#/components/schemas/NotificationChannel' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/notifications/channels/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [notifications]
      summary: Get a channel (masked)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationChannel' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [notifications]
      summary: Update a channel
      description: >-
        Selectively update enabled state, subscribed events, or the transport
        config (write-only). For webhook/slack supply `url` (+ optional
        `hmac_key`); for smtp supply `smtp_host` (which signals a full SMTP
        config replacement) with the other `smtp_*` fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
                events:
                  type: array
                  items: { type: string }
                url: { type: string, writeOnly: true }
                hmac_key: { type: string, writeOnly: true }
                smtp_host: { type: string, description: "Present ⇒ replace the full SMTP config (type=smtp)." }
                smtp_port: { type: integer, minimum: 1, maximum: 65535 }
                smtp_from: { type: string }
                smtp_to:
                  type: array
                  items: { type: string }
                smtp_username: { type: string }
                smtp_password: { type: string, writeOnly: true }
                smtp_tls_mode: { type: string, enum: [starttls, implicit, none] }
                smtp_insecure_skip_verify: { type: boolean }
      responses:
        "200": { description: Updated (masked channel view). }
        "400": { description: Validation error. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [notifications]
      summary: Delete a channel
      responses:
        "204": { description: Deleted. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/notifications/channels/{id}/test:
    post:
      tags: [notifications]
      summary: Send a synchronous test notification
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Test delivered. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "502": { description: Test delivery failed (channel unreachable / non-2xx). }
  /v1/notifications/channels/{id}/deliveries:
    get:
      tags: [notifications]
      summary: Recent delivery history for a channel (value-free)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  deliveries:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        event_kind: { type: string }
                        status: { type: string, enum: [pending, delivered, failed] }
                        attempts: { type: integer }
                        next_attempt_at: { type: string, format: date-time }
                        last_error: { type: string }
                        created_at: { type: string, format: date-time }
                        delivered_at: { type: string, format: date-time }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------
  # break-glass (guarded, time-boxed emergency role elevation)
  # ---------------------------------------------------------------------
  /v1/break-glass:
    post:
      tags: [break-glass]
      summary: Activate break-glass (guarded self-service emergency elevation)
      description: >-
        Time-boxed role elevation on a scope you ALREADY hold a role on
        (deny-by-default: no existing binding on that scope ⇒ 403). Raises you to
        a strictly-higher role (up to `owner`) on that scope for a bounded time.
        A non-empty `reason` is mandatory and is stamped into the audit chain and
        forwarded to notification channels (`breakglass.activated`). The reason is
        operator-entered text, never a secret. `ttl` is clamped to the server max
        (`JANUS_BREAKGLASS_MAX_TTL`, default 1h). Available to user accounts only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scope_level, role, reason]
              properties:
                scope_level: { type: string, enum: [instance, project, environment] }
                project_id: { type: string, format: uuid, description: "Required when scope_level=project." }
                environment_id: { type: string, format: uuid, description: "Required when scope_level=environment." }
                role: { type: string, enum: [viewer, developer, admin, owner], description: "Target role; must exceed your held role and not exceed owner." }
                reason: { type: string, maxLength: 1000, description: "Mandatory justification (non-secret; audited)." }
                ttl: { type: string, example: "30m", description: "Requested duration (Go duration); clamped to the server max." }
      responses:
        "201": { description: Grant created (value-safe grant view). }
        "400": { description: Validation error (empty reason, invalid role, no-op elevation, bad TTL). }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    get:
      tags: [break-glass]
      summary: List active break-glass grants
      description: >-
        Admins (instance `member:manage`) see every active grant; other users see
        only their own. Value-safe: grants carry no secret material.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  grants:
                    type: array
                    items: { $ref: '#/components/schemas/BreakGlassGrant' }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /v1/break-glass/{id}:
    delete:
      tags: [break-glass]
      summary: End a break-glass grant early
      description: The grant's owner or an instance admin may end it before expiry.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Grant ended. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { description: The grant is not active (already revoked/expired). }

  # ---------------------------------------------------------------------
  # dynamic
  # ---------------------------------------------------------------------
  /v1/dynamic/roles:
    get:
      tags: [dynamic]
      summary: List dynamic Postgres roles for a config
      parameters:
        - { name: config_id, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items: { $ref: '#/components/schemas/DynamicRole' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [dynamic]
      summary: Create a dynamic Postgres role definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config_id, name]
              properties:
                config_id: { type: string, format: uuid }
                name: { type: string, example: readonly-app }
                default_ttl_seconds: { type: integer }
                max_ttl_seconds: { type: integer }
                config:
                  type: object
                  description: Admin-authored SQL templates ({{name}}/{{password}}/{{expiration}} interpolated).
                  properties:
                    admin_dsn: { type: string, writeOnly: true, example: "<secret value>" }
                    creation_statements: { type: string, example: "CREATE ROLE \"{{name}}\" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}';" }
                    revocation_statements: { type: string, example: "DROP ROLE IF EXISTS \"{{name}}\";" }
                    renew_statements: { type: string, example: "ALTER ROLE \"{{name}}\" VALID UNTIL '{{expiration}}';" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DynamicRole' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: A role already exists for this config and name. }
  /v1/dynamic/roles/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [dynamic]
      summary: Get a dynamic role definition
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DynamicRole' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [dynamic]
      summary: Update a dynamic role definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                default_ttl_seconds: { type: integer, nullable: true }
                max_ttl_seconds: { type: integer, nullable: true }
                config:
                  type: object
                  nullable: true
                  properties:
                    admin_dsn: { type: string, writeOnly: true, example: "<secret value>" }
                    creation_statements: { type: string }
                    revocation_statements: { type: string }
                    renew_statements: { type: string }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DynamicRole' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [dynamic]
      summary: Delete a dynamic role definition
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/dynamic/roles/{id}/creds:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [dynamic]
      summary: Issue a new dynamic credential lease
      description: The generated password is returned exactly once, in this response; it is never persisted or audited in plaintext.
      responses:
        "201":
          description: Issued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  lease_id: { type: string }
                  username: { type: string }
                  password: { type: string, writeOnly: true, example: "<secret value>", description: Returned once; not persisted. }
                  expires_at: { type: string, format: date-time }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "503": { description: Server is sealed. }
  /v1/dynamic/leases:
    get:
      tags: [dynamic]
      summary: List credential leases for a role
      parameters:
        - { name: role_id, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  leases:
                    type: array
                    items: { $ref: '#/components/schemas/DynamicLease' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/dynamic/leases/{id}/renew:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [dynamic]
      summary: Renew an active lease (extends expiry, capped at the role's max TTL)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DynamicLease' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { description: Lease is not active. }
  /v1/dynamic/leases/{id}/revoke:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [dynamic]
      summary: Revoke a lease immediately (drops the database role)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked: { type: boolean }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------
  # sys
  # ---------------------------------------------------------------------
  /v1/sys/health:
    get:
      tags: [sys]
      summary: Basic health/init/seal snapshot (unauthenticated)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  initialized: { type: boolean }
                  sealed: { type: boolean }
  /v1/sys/live:
    get:
      tags: [sys]
      summary: Process liveness probe (touches nothing; unauthenticated)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: live }
  /v1/sys/ready:
    get:
      tags: [sys]
      summary: Readiness probe (DB reachable AND initialized AND unsealed; unauthenticated)
      responses:
        "200":
          description: Ready.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ready }
        "503": { description: Not ready (database unreachable, not initialized, or sealed). }
  /v1/sys/seal-status:
    get:
      tags: [sys]
      summary: Seal type, initialization, and unseal progress (unauthenticated)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  initialized: { type: boolean }
                  sealed: { type: boolean }
                  type: { type: string, enum: [shamir, awskms, gcpkms, azurekv] }
                  threshold: { type: integer }
                  shares: { type: integer }
                  progress:
                    type: object
                    nullable: true
                    properties:
                      submitted: { type: integer }
                      required: { type: integer }
  /v1/sys/init:
    post:
      tags: [sys]
      summary: Initialize the seal (pre-auth bootstrap; only succeeds on an uninitialized instance)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                shares: { type: integer, description: Shamir only; 0 uses library defaults. }
                threshold: { type: integer, description: Shamir only. }
                admin_email: { type: string, format: email, default: admin@localhost }
      responses:
        "200":
          description: >
            Initialized. For a Shamir seal, `shares` is the ONLY copy of the
            unseal shares, returned once. `admin.password` is a one-time
            generated credential.
          content:
            application/json:
              schema:
                type: object
                properties:
                  type: { type: string, enum: [shamir, awskms, gcpkms, azurekv] }
                  shares:
                    type: array
                    items: { type: string, writeOnly: true, example: "<secret value>" }
                  admin:
                    type: object
                    nullable: true
                    properties:
                      email: { type: string }
                      password: { type: string, writeOnly: true, example: "<secret value>" }
        "400": { description: Invalid seal parameters. }
        "409": { description: Seal is already initialized. }
  /v1/sys/unseal:
    post:
      tags: [sys]
      summary: Submit an unseal share (Shamir) or trigger auto-unseal (KMS)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                share: { type: string, writeOnly: true, example: "<secret value>", description: Hex-encoded Shamir share; omit for a KMS seal. }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sealed: { type: boolean }
                  progress:
                    type: object
                    nullable: true
                    properties:
                      submitted: { type: integer }
                      required: { type: integer }
        "400": { description: Not initialized, invalid share, or duplicate share. }
  /v1/sys/unseal/reset:
    post:
      tags: [sys]
      summary: Discard shares submitted so far in the current unseal attempt (Shamir only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sealed: { type: boolean }
        "400": { description: Not initialized, or seal is not Shamir. }
  /v1/sys/restore:
    post:
      tags: [sys]
      summary: Restore a full-instance backup (pre-auth bootstrap; only succeeds on an empty instance)
      requestBody:
        required: true
        content:
          application/x-ndjson:
            schema:
              type: string
              description: A backup header line followed by one JSON record line per row (as produced by GET /v1/sys/backup).
      responses:
        "200":
          description: Restored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  restored: { type: boolean }
                  sealed: { type: boolean }
        "409": { description: Instance is not empty. }
        "422": { description: Malformed, incompatible, or empty backup; instance left unchanged. }
  /v1/sys/seal:
    post:
      tags: [sys]
      summary: Seal the server (drops the in-memory master key)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sealed: { type: boolean }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/sys/backup:
    get:
      tags: [sys]
      summary: Stream a key-preserving full-instance backup (JSONL, rows as stored — no plaintext secrets)
      responses:
        "200":
          description: Streamed backup file.
          content:
            application/x-ndjson:
              schema: { type: string }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/sys/version:
    get:
      tags: [sys]
      summary: Build metadata (version, commit, date)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string }
                  commit: { type: string }
                  date: { type: string }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /v1/sys/status:
    get:
      tags: [sys]
      summary: Admin operational health snapshot (value-free)
      description: >
        Returns a value-free operational snapshot for the health panel: version,
        uptime, seal state, DB reachability/latency/pool, audit head, per-engine
        scheduler status, failed-run counts, and active-lease count. No secrets
        or per-user data. Requires instance-level audit:read. An unreachable
        database yields db.reachable=false and still returns 200.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string }
                  commit: { type: string }
                  uptime_seconds: { type: integer }
                  sealed: { type: boolean }
                  seal_type: { type: string }
                  db:
                    type: object
                    properties:
                      reachable: { type: boolean }
                      latency_ms: { type: integer }
                      pool:
                        type: object
                        properties:
                          total: { type: integer }
                          idle: { type: integer }
                          acquired: { type: integer }
                          max: { type: integer }
                  audit:
                    type: object
                    properties:
                      head_seq: { type: integer }
                      event_count: { type: integer }
                  schedulers:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        enabled: { type: boolean }
                        last_tick_age_seconds: { type: integer, nullable: true }
                        interval_seconds: { type: integer }
                  runs:
                    type: object
                    properties:
                      rotation_failed: { type: integer }
                      sync_failed: { type: integer }
                  leases:
                    type: object
                    properties:
                      active: { type: integer }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/sys/oidc:
    get:
      tags: [sys]
      summary: Get the OIDC human-login provider configuration (secret_set flag only, never the client secret)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OIDCProviderView' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      tags: [sys]
      summary: Set the OIDC human-login provider configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: Google }
                issuer: { type: string, example: "https://accounts.google.com" }
                client_id: { type: string }
                client_secret: { type: string, writeOnly: true, example: "<secret value>" }
                scopes:
                  type: array
                  items: { type: string }
                redirect_url: { type: string }
                enabled: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400": { description: Invalid provider config. }
        "403": { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [sys]
      summary: Delete the OIDC human-login provider configuration
      responses:
        "204": { description: Deleted. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/sys/oidc/federation:
    get:
      tags: [sys]
      summary: Get the OIDC CI-federation (machine identity) configuration
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FederationConfigView' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      tags: [sys]
      summary: Set the OIDC CI-federation configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issuer:
                  type: string
                  description: >-
                    OIDC issuer URL (well-formed absolute http(s) URL). One CI
                    provider is active at a time. Known issuers: GitHub Actions
                    `https://token.actions.githubusercontent.com`, GitLab
                    `https://gitlab.com`, Buildkite `https://agent.buildkite.com`,
                    CircleCI `https://oidc.circleci.com/org/<ORG_ID>`. Empty
                    defaults to GitHub Actions.
                  example: "https://token.actions.githubusercontent.com"
                audience: { type: string }
                enabled: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400": { description: Invalid federation config. }
        "403": { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [sys]
      summary: Delete the OIDC CI-federation configuration
      responses:
        "204": { description: Deleted. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/sys/oidc/federation/bindings:
    get:
      tags: [sys]
      summary: List CI-federation trust bindings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FederationBinding' }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [sys]
      summary: Create a CI-federation trust binding (structured claim match -> scoped token grant)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: deploy-prod }
                match_claims:
                  type: object
                  additionalProperties: { type: string }
                  description: >-
                    Exact claim conditions (all AND-ed). Must constrain at least
                    one strong identifying claim for the configured issuer
                    (GitHub `repository`, GitLab `project_path`, Buildkite
                    `organization_slug`, CircleCI project-id; any non-empty claim
                    for a custom issuer). Empty values are rejected.
                  example: { repository: "acme/web" }
                scope_kind: { type: string, enum: [config, environment] }
                scope_id: { type: string, format: uuid }
                access: { type: string, enum: [read, readwrite] }
                ttl_seconds: { type: integer, maximum: 3600 }
                enabled: { type: boolean }
      responses:
        "200":
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FederationBinding' }
        "400": { description: Invalid binding or unknown scope. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/sys/oidc/federation/bindings/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    delete:
      tags: [sys]
      summary: Delete a CI-federation trust binding
      responses:
        "204": { description: Deleted. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/sys/master-key:
    get:
      tags: [sys]
      summary: Get master-key status (seal type, version, rotated_at, rekey ceremony progress). Owner-only.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  unseal_type: { type: string, enum: [shamir, awskms, gcpkms, azurekv] }
                  master_key_version: { type: integer }
                  rekey_in_progress: { type: boolean }
                  submitted: { type: integer }
                  required: { type: integer }
                  rotated_at: { type: [string, "null"], format: date-time }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/sys/master-key/rotate:
    post:
      tags: [sys]
      summary: Rotate the master key in a single call (KMS seals only; Shamir requires a rekey ceremony). Owner-only.
      responses:
        "200":
          description: Rotated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  master_key_version: { type: integer }
        "400": { description: Shamir seal requires a rekey ceremony. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "503": { description: Server is sealed. }
  /v1/sys/master-key/rekey/init:
    post:
      tags: [sys]
      summary: Open a Shamir master-key rekey (proof-of-possession) ceremony. Owner-only.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  nonce: { type: string }
                  required: { type: integer }
                  submitted: { type: integer }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: A rekey ceremony is already in progress. }
        "503": { description: Server is sealed. }
  /v1/sys/master-key/rekey/submit:
    post:
      tags: [sys]
      summary: Submit one current unseal share to the open rekey ceremony. Owner-only.
      description: On completion, the response carries the operator's only copy of the freshly generated unseal shares.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nonce, share]
              properties:
                nonce: { type: string }
                share: { type: string, writeOnly: true, example: "<secret value>", description: Hex-encoded current unseal share. }
      responses:
        "200":
          description: OK. `new_shares` is present only when the ceremony completes on this call.
          content:
            application/json:
              schema:
                type: object
                properties:
                  complete: { type: boolean }
                  submitted: { type: integer }
                  required: { type: integer }
                  master_key_version: { type: integer }
                  new_shares:
                    type: array
                    items: { type: string, writeOnly: true, example: "<secret value>" }
        "400": { description: Invalid nonce/share, or rejected by reconstruction. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/sys/master-key/rekey:
    delete:
      tags: [sys]
      summary: Cancel the open rekey ceremony (zeroizes accumulated shares). Owner-only.
      responses:
        "204": { description: Canceled. }
        "400": { description: KMS seal has no ceremony to cancel. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: No ceremony is open. }
