        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/rotation/policies/{id}/rotate:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [rotation]
      summary: Trigger an immediate rotation for this policy
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  rotated: { type: boolean }
                  config_version: { type: integer }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "503": { description: Server is sealed. }

  # ---------------------------------------------------------------------
  # sync
  # ---------------------------------------------------------------------
  /v1/sync/targets:
    get:
      tags: [sync]
      summary: List sync targets for a project
      parameters:
        - { name: project_id, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  targets:
                    type: array
                    items: { $ref: '#/components/schemas/SyncTarget' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [sync]
      summary: Create a sync target (GitHub Actions secrets or Kubernetes Secrets)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config_id, provider]
              properties:
                config_id: { type: string, format: uuid }
                provider: { type: string, enum: [github, kubernetes] }
                prune: { type: boolean, nullable: true, description: "Defaults to true when omitted." }
                interval_seconds: { type: integer }
                addr:
                  type: object
                  properties:
                    owner: { type: string, description: GitHub owner (github provider). }
                    repo: { type: string, description: GitHub repo (github provider). }
                    environment: { type: string, description: GitHub environment name (github provider). }
                    namespace: { type: string, description: Kubernetes namespace (kubernetes provider). }
                    secret_name: { type: string, description: Kubernetes Secret name (kubernetes provider). }
                creds:
                  type: object
                  description: Provider credentials; all fields write-only.
                  properties:
                    pat: { type: string, writeOnly: true, example: "<secret value>", description: GitHub PAT. }
                    api_url: { type: string, description: Kubernetes API server URL. }
                    ca_cert: { type: string, writeOnly: true, example: "<secret value>", description: Kubernetes cluster CA cert. }
                    token: { type: string, writeOnly: true, example: "<secret value>", description: Kubernetes bearer token. }
      responses:
        "201":
          description: Created (masked; no creds/fingerprint in the response).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SyncTarget' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: A target already exists for this config, provider, and destination. }
  /v1/sync/targets/{id}:
