            schema:
              type: object
              properties:
                interval_seconds: { type: integer, nullable: true }
                prune: { type: boolean, nullable: true }
                status: { type: string, nullable: true, enum: [active, paused, failed] }
                addr:
                  type: object
                  nullable: true
                  properties:
                    owner: { type: string }
                    repo: { type: string }
                    environment: { type: string }
                    namespace: { type: string }
                    secret_name: { type: string }
                creds:
                  type: object
                  nullable: true
                  properties:
                    pat: { type: string, writeOnly: true, example: "<secret value>" }
                    api_url: { type: string }
                    ca_cert: { type: string, writeOnly: true, example: "<secret value>" }
                    token: { type: string, writeOnly: true, example: "<secret value>" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SyncTarget' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [sync]
      summary: Delete a sync target
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/sync/targets/{id}/runs:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [sync]
