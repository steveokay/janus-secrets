        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [rotation]
      summary: Create a rotation policy (Postgres ALTER ROLE or generic webhook)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config_id, secret_key, type]
              properties:
                config_id: { type: string, format: uuid }
                secret_key: { type: string, example: DATABASE_PASSWORD }
                type: { type: string, enum: [postgres, webhook] }
                interval_seconds: { type: integer }
                config:
                  type: object
                  description: Rotator-specific config; credential fields are write-only.
                  properties:
                    admin_dsn: { type: string, writeOnly: true, example: "<secret value>" }
                    role: { type: string }
                    password_len: { type: integer }
                    url: { type: string }
                    hmac_key: { type: string, writeOnly: true, example: "<secret value>" }
                    notify_url: { type: string }
                    notify_hmac_key: { type: string, writeOnly: true, example: "<secret value>" }
      responses:
        "201":
          description: Created (masked; no secrets/DSN/keys in the response).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RotationPolicy' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: A policy already exists for this config and key. }
  /v1/rotation/policies/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [rotation]
