  # ---------------------------------------------------------------------
  # dynamic
  # ---------------------------------------------------------------------
  /v1/dynamic/roles:
    get:
      tags: [dynamic]
      summary: List dynamic Postgres roles for a config
      parameters:
        - { name: config_id, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items: { $ref: '#/components/schemas/DynamicRole' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [dynamic]
      summary: Create a dynamic Postgres role definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config_id, name]
              properties:
                config_id: { type: string, format: uuid }
                name: { type: string, example: readonly-app }
                default_ttl_seconds: { type: integer }
                max_ttl_seconds: { type: integer }
                config:
                  type: object
                  description: Admin-authored SQL templates ({{name}}/{{password}}/{{expiration}} interpolated).
                  properties:
                    admin_dsn: { type: string, writeOnly: true, example: "<secret value>" }
                    creation_statements: { type: string, example: "CREATE ROLE \"{{name}}\" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}';" }
                    revocation_statements: { type: string, example: "DROP ROLE IF EXISTS \"{{name}}\";" }
                    renew_statements: { type: string, example: "ALTER ROLE \"{{name}}\" VALID UNTIL '{{expiration}}';" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DynamicRole' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: A role already exists for this config and name. }
  /v1/dynamic/roles/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [dynamic]
      summary: Get a dynamic role definition
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DynamicRole' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [dynamic]
      summary: Update a dynamic role definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                default_ttl_seconds: { type: integer, nullable: true }
                max_ttl_seconds: { type: integer, nullable: true }
                config:
                  type: object
                  nullable: true
                  properties:
                    admin_dsn: { type: string, writeOnly: true, example: "<secret value>" }
                    creation_statements: { type: string }
                    revocation_statements: { type: string }
                    renew_statements: { type: string }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DynamicRole' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [dynamic]
      summary: Delete a dynamic role definition
      responses:
        "200":
          description: Deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/dynamic/roles/{id}/creds:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [dynamic]
      summary: Issue a new dynamic credential lease
      description: The generated password is returned exactly once, in this response; it is never persisted or audited in plaintext.
      responses:
        "201":
          description: Issued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  lease_id: { type: string }
                  username: { type: string }
                  password: { type: string, writeOnly: true, example: "<secret value>", description: Returned once; not persisted. }
                  expires_at: { type: string, format: date-time }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "503": { description: Server is sealed. }
  /v1/dynamic/leases:
    get:
      tags: [dynamic]
      summary: List credential leases for a role
      parameters:
        - { name: role_id, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  leases:
                    type: array
                    items: { $ref: '#/components/schemas/DynamicLease' }
        "400": { description: Validation error. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/dynamic/leases/{id}/renew:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [dynamic]
      summary: Renew an active lease (extends expiry, capped at the role's max TTL)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DynamicLease' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { description: Lease is not active. }
  /v1/dynamic/leases/{id}/revoke:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [dynamic]
      summary: Revoke a lease immediately (drops the database role)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked: { type: boolean }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------
  # sys
  # ---------------------------------------------------------------------
  /v1/sys/health:
    get:
      tags: [sys]
      summary: Basic health/init/seal snapshot (unauthenticated)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  initialized: { type: boolean }
                  sealed: { type: boolean }
  /v1/sys/live:
    get:
      tags: [sys]
      summary: Process liveness probe (touches nothing; unauthenticated)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: live }
  /v1/sys/ready:
    get:
      tags: [sys]
      summary: Readiness probe (DB reachable AND initialized AND unsealed; unauthenticated)
      responses:
        "200":
          description: Ready.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ready }
        "503": { description: Not ready (database unreachable, not initialized, or sealed). }
  /v1/sys/seal-status:
    get:
      tags: [sys]
      summary: Seal type, initialization, and unseal progress (unauthenticated)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  initialized: { type: boolean }
                  sealed: { type: boolean }
                  type: { type: string, enum: [shamir, awskms] }
                  threshold: { type: integer }
                  shares: { type: integer }
                  progress:
                    type: object
                    nullable: true
                    properties:
                      submitted: { type: integer }
                      required: { type: integer }
  /v1/sys/init:
    post:
      tags: [sys]
      summary: Initialize the seal (pre-auth bootstrap; only succeeds on an uninitialized instance)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                shares: { type: integer, description: Shamir only; 0 uses library defaults. }
                threshold: { type: integer, description: Shamir only. }
                admin_email: { type: string, format: email, default: admin@localhost }
      responses:
        "200":
          description: >
            Initialized. For a Shamir seal, `shares` is the ONLY copy of the
            unseal shares, returned once. `admin.password` is a one-time
            generated credential.
          content:
            application/json:
              schema:
                type: object
                properties:
                  type: { type: string, enum: [shamir, awskms] }
                  shares:
                    type: array
                    items: { type: string, writeOnly: true, example: "<secret value>" }
                  admin:
                    type: object
                    nullable: true
                    properties:
                      email: { type: string }
                      password: { type: string, writeOnly: true, example: "<secret value>" }
        "400": { description: Invalid seal parameters. }
        "409": { description: Seal is already initialized. }
  /v1/sys/unseal:
    post:
      tags: [sys]
      summary: Submit an unseal share (Shamir) or trigger auto-unseal (KMS)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                share: { type: string, writeOnly: true, example: "<secret value>", description: Hex-encoded Shamir share; omit for a KMS seal. }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sealed: { type: boolean }
                  progress:
                    type: object
                    nullable: true
                    properties:
                      submitted: { type: integer }
                      required: { type: integer }
        "400": { description: Not initialized, invalid share, or duplicate share. }
  /v1/sys/unseal/reset:
    post:
      tags: [sys]
      summary: Discard shares submitted so far in the current unseal attempt (Shamir only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sealed: { type: boolean }
        "400": { description: Not initialized, or seal is not Shamir. }
  /v1/sys/restore:
    post:
      tags: [sys]
      summary: Restore a full-instance backup (pre-auth bootstrap; only succeeds on an empty instance)
      requestBody:
        required: true
        content:
          application/x-ndjson:
            schema:
              type: string
              description: A backup header line followed by one JSON record line per row (as produced by GET /v1/sys/backup).
      responses:
        "200":
          description: Restored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  restored: { type: boolean }
                  sealed: { type: boolean }
        "409": { description: Instance is not empty. }
        "422": { description: Malformed, incompatible, or empty backup; instance left unchanged. }
  /v1/sys/seal:
    post:
      tags: [sys]
      summary: Seal the server (drops the in-memory master key)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sealed: { type: boolean }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/sys/backup:
    get:
      tags: [sys]
      summary: Stream a key-preserving full-instance backup (JSONL, rows as stored — no plaintext secrets)
      responses:
        "200":
          description: Streamed backup file.
          content:
            application/x-ndjson:
              schema: { type: string }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/sys/version:
    get:
      tags: [sys]
      summary: Build metadata (version, commit, date)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string }
                  commit: { type: string }
                  date: { type: string }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /v1/sys/oidc:
    get:
      tags: [sys]
      summary: Get the OIDC human-login provider configuration (secret_set flag only, never the client secret)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OIDCProviderView' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      tags: [sys]
      summary: Set the OIDC human-login provider configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: Google }
                issuer: { type: string, example: "https://accounts.google.com" }
                client_id: { type: string }
                client_secret: { type: string, writeOnly: true, example: "<secret value>" }
                scopes:
                  type: array
                  items: { type: string }
                redirect_url: { type: string }
                enabled: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400": { description: Invalid provider config. }
        "403": { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [sys]
      summary: Delete the OIDC human-login provider configuration
      responses:
        "204": { description: Deleted. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/sys/oidc/federation:
    get:
      tags: [sys]
      summary: Get the OIDC CI-federation (machine identity) configuration
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FederationConfigView' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      tags: [sys]
      summary: Set the OIDC CI-federation configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issuer: { type: string, example: "https://token.actions.githubusercontent.com" }
                audience: { type: string }
                enabled: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400": { description: Invalid federation config. }
        "403": { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [sys]
      summary: Delete the OIDC CI-federation configuration
      responses:
        "204": { description: Deleted. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/sys/oidc/federation/bindings:
    get:
      tags: [sys]
      summary: List CI-federation trust bindings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FederationBinding' }
        "403": { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [sys]
      summary: Create a CI-federation trust binding (structured claim match -> scoped token grant)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: deploy-prod }
                match_claims:
                  type: object
                  additionalProperties: { type: string }
                  example: { repository: "acme/web" }
                scope_kind: { type: string, enum: [config, environment] }
                scope_id: { type: string, format: uuid }
                access: { type: string, enum: [read, readwrite] }
                ttl_seconds: { type: integer, maximum: 3600 }
                enabled: { type: boolean }
      responses:
        "200":
          description: Created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FederationBinding' }
        "400": { description: Invalid binding or unknown scope. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/sys/oidc/federation/bindings/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    delete:
      tags: [sys]
      summary: Delete a CI-federation trust binding
      responses:
        "204": { description: Deleted. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /v1/sys/master-key:
    get:
      tags: [sys]
      summary: Get master-key status (seal type, version, rotated_at, rekey ceremony progress). Owner-only.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  unseal_type: { type: string, enum: [shamir, awskms] }
                  master_key_version: { type: integer }
                  rekey_in_progress: { type: boolean }
                  submitted: { type: integer }
                  required: { type: integer }
                  rotated_at: { type: [string, "null"], format: date-time }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/sys/master-key/rotate:
    post:
      tags: [sys]
      summary: Rotate the master key in a single call (KMS seals only; Shamir requires a rekey ceremony). Owner-only.
      responses:
        "200":
          description: Rotated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  master_key_version: { type: integer }
        "400": { description: Shamir seal requires a rekey ceremony. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "503": { description: Server is sealed. }
  /v1/sys/master-key/rekey/init:
    post:
      tags: [sys]
      summary: Open a Shamir master-key rekey (proof-of-possession) ceremony. Owner-only.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  nonce: { type: string }
                  required: { type: integer }
                  submitted: { type: integer }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: A rekey ceremony is already in progress. }
        "503": { description: Server is sealed. }
  /v1/sys/master-key/rekey/submit:
    post:
      tags: [sys]
      summary: Submit one current unseal share to the open rekey ceremony. Owner-only.
      description: On completion, the response carries the operator's only copy of the freshly generated unseal shares.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nonce, share]
              properties:
                nonce: { type: string }
                share: { type: string, writeOnly: true, example: "<secret value>", description: Hex-encoded current unseal share. }
      responses:
        "200":
          description: OK. `new_shares` is present only when the ceremony completes on this call.
          content:
            application/json:
              schema:
                type: object
                properties:
                  complete: { type: boolean }
                  submitted: { type: integer }
                  required: { type: integer }
                  master_key_version: { type: integer }
                  new_shares:
                    type: array
                    items: { type: string, writeOnly: true, example: "<secret value>" }
        "400": { description: Invalid nonce/share, or rejected by reconstruction. }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/sys/master-key/rekey:
    delete:
      tags: [sys]
      summary: Cancel the open rekey ceremony (zeroizes accumulated shares). Owner-only.
      responses:
        "204": { description: Canceled. }
        "400": { description: KMS seal has no ceremony to cancel. }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { description: No ceremony is open. }
