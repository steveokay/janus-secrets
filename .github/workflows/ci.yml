name: ci

on:
  push:
    branches: [main, 'milestone-*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...
      - name: enforce 100% coverage on internal/crypto
        run: |
          go test -coverprofile=crypto.out ./internal/crypto
          pct=$(go tool cover -func=crypto.out | tail -1 | awk '{print $3}')
          echo "internal/crypto coverage: $pct"
          if [ "$pct" != "100.0%" ]; then
            echo "coverage gate failed: internal/crypto must be 100.0%"
            exit 1
          fi
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - name: gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.27.1 -exclude-dir=internal/crypto/shamir ./...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: unit tests
        run: npm test -- --run
      - name: build bundle
        run: npm run build
      - name: locate chrome
        run: echo "CHROME_BIN=$(which google-chrome || which google-chrome-stable || which chromium-browser)" >> "$GITHUB_ENV"
      - name: serve bundle
        run: npm run preview -- --port 8210 --strictPort --host 127.0.0.1 &
      - name: wait for bundle
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8210/ >/dev/null && exit 0
            sleep 1
          done
          echo "preview server did not come up on :8210"; exit 1
      - name: dual-theme smoke
        env:
          SMOKE_URL: http://127.0.0.1:8210
          SMOKE_BROWSER: ${{ env.CHROME_BIN }}
        run: npm run smoke
